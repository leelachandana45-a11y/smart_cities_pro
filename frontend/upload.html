<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload Analysis | Smart Cities Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #050505;
            --surface-color: #121212;
            --primary-color: #007AFF;
            --secondary-color: #32D74B;
            --risk-high: #FF3B30;
            --risk-medium: #FF9500;
            --risk-low: #34C759;
            --text-main: #FFFFFF;
            --text-secondary: #8E8E93;
            --border-color: #2C2C2E;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
        }

        nav {
            height: 70px;
            background: rgba(5, 5, 5, 0.8);
            backdrop-filter: blur(20px);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 5%;
            z-index: 1000;
            border-bottom: 1px solid var(--border-color);
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: -1px;
            background: linear-gradient(135deg, #fff 0%, #888 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .nav-links {
            display: flex;
            gap: 2rem;
        }

        .nav-links a {
            color: var(--text-secondary);
            text-decoration: none;
            font-weight: 500;
            transition: all 0.3s ease;
            font-size: 0.95rem;
        }

        .nav-links a:hover,
        .nav-links a.active {
            color: var(--text-main);
        }

        .nav-links a.active {
            position: relative;
        }

        .nav-links a.active::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 0;
            width: 100%;
            height: 2px;
            background: var(--primary-color);
            border-radius: 2px;
        }

        main {
            padding: 4rem 5%;
            max-width: 800px;
            margin: 0 auto;
        }

        header {
            margin-bottom: 3rem;
            text-align: center;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 1rem;
            letter-spacing: -1px;
        }

        .subtitle {
            color: var(--text-secondary);
            font-size: 1.1rem;
        }

        .upload-card {
            background: var(--surface-color);
            border-radius: 24px;
            border: 1px solid var(--border-color);
            padding: 2.5rem;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }

        .drop-zone {
            border: 2px dashed var(--border-color);
            border-radius: 20px;
            padding: 3rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 2rem;
            position: relative;
            overflow: hidden;
        }

        .drop-zone:hover,
        .drop-zone.drag-over {
            border-color: var(--primary-color);
            background: rgba(0, 122, 255, 0.05);
        }

        .drop-zone img {
            max-width: 100%;
            max-height: 300px;
            border-radius: 12px;
            display: none;
            margin-top: 1rem;
        }

        .drop-zone i {
            font-size: 3rem;
            color: var(--text-secondary);
            margin-bottom: 1rem;
        }

        .input-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .field {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        label {
            font-size: 0.85rem;
            color: var(--text-secondary);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input[type="number"] {
            background: #1c1c1e;
            border: 1px solid var(--border-color);
            color: white;
            padding: 0.8rem 1rem;
            border-radius: 12px;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.3s ease;
        }

        input[type="number"]:focus {
            border-color: var(--primary-color);
        }

        .btn-upload {
            width: 100%;
            background: var(--primary-color);
            color: white;
            border: none;
            padding: 1rem;
            border-radius: 14px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.8rem;
        }

        .btn-upload:hover {
            background: #1982ff;
            transform: translateY(-2px);
        }

        .btn-upload:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        /* Results Display */
        .result-container {
            margin-top: 2rem;
            padding: 1.5rem;
            border-radius: 16px;
            display: none;
            text-align: center;
            animation: slideUp 0.5s ease-out;
        }

        .result-label {
            font-size: 0.9rem;
            color: var(--text-secondary);
            margin-bottom: 0.5rem;
        }

        .result-value {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 1rem;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .risk-HIGH {
            background: rgba(255, 59, 48, 0.1);
            border: 1px solid var(--risk-high);
        }

        .risk-MEDIUM {
            background: rgba(255, 149, 0, 0.1);
            border: 1px solid var(--risk-medium);
        }

        .risk-LOW {
            background: rgba(52, 199, 89, 0.1);
            border: 1px solid var(--risk-low);
        }
    </style>
</head>

<body>

    <nav>
        <div class="logo">Smart Cities Pro</div>
        <div class="nav-links">
            <a href="index.html">Live Map</a>
            <a href="history.html">Risk History</a>
            <a href="upload.html" class="active">Upload Analysis</a>
        </div>
    </nav>

    <main>
        <header>
            <h1>Analyze Road Image</h1>
            <p class="subtitle">Upload high-resolution images to predict surface friction and safety risk.</p>
        </header>

        <div class="upload-card">
            <form id="upload-form">
                <div class="drop-zone" id="drop-zone">
                    <div id="drop-zone-content">
                        <i class="fas fa-cloud-upload-alt"></i>
                        <p>Click to select image or drag & drop</p>
                        <span style="font-size: 0.8rem; color: var(--text-secondary)">Supports JPG, PNG</span>
                    </div>
                    <img id="preview" alt="Preview">
                    <input type="file" id="file-input" accept="image/*" style="display: none;">
                </div>

                <div class="input-group">
                    <div class="field">
                        <label>Latitude (Optional)</label>
                        <input type="number" id="lat" step="any" placeholder="e.g. 13.0827">
                    </div>
                    <div class="field">
                        <label>Longitude (Optional)</label>
                        <input type="number" id="lng" step="any" placeholder="e.g. 80.2707">
                    </div>
                </div>

                <button type="submit" class="btn-upload" id="submit-btn" disabled>
                    <i class="fas fa-microchip"></i>
                    Start AI Assessment
                </button>
            </form>

            <div id="result" class="result-container">
                <div class="result-label">Assessment Result</div>
                <div id="result-text" class="result-value">-</div>
                <div id="result-friction" style="font-size: 1.1rem; opacity: 0.8">Friction: -</div>
            </div>
        </div>
    </main>

    <script>
        const dropZone = document.getElementById('drop-zone');
        const fileInput = document.getElementById('file-input');
        const preview = document.getElementById('preview');
        const content = document.getElementById('drop-zone-content');
        const submitBtn = document.getElementById('submit-btn');
        const form = document.getElementById('upload-form');
        const resultDiv = document.getElementById('result');

        dropZone.onclick = () => fileInput.click();

        fileInput.onchange = () => {
            const file = fileInput.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    preview.src = e.target.result;
                    preview.style.display = 'block';
                    content.style.display = 'none';
                    submitBtn.disabled = false;
                };
                reader.readAsDataURL(file);
            }
        };

        form.onsubmit = async (e) => {
            e.preventDefault();

            const file = fileInput.files[0];
            if (!file) return;

            submitBtn.disabled = true;
            submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Processing...';
            resultDiv.style.display = 'none';

            const formData = new FormData();
            formData.append('file', file);

            const lat = document.getElementById('lat').value;
            const lng = document.getElementById('lng').value;

            if (lat) formData.append('latitude', lat);
            if (lng) formData.append('longitude', lng);

            try {
                const response = await fetch('http://127.0.0.1:8000/predict', {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();

                resultDiv.className = `result-container risk-${data.risk_level}`;
                resultDiv.style.display = 'block';

                document.getElementById('result-text').textContent = `${data.risk_level} RISK`;
                document.getElementById('result-friction').textContent = `Friction Coefficient: ${data.friction.toFixed(4)}`;

                // Re-enable button
                submitBtn.disabled = false;
                submitBtn.innerHTML = '<i class="fas fa-check"></i> Analysis Complete';

                setTimeout(() => {
                    submitBtn.innerHTML = '<i class="fas fa-microchip"></i> Start AI Assessment';
                }, 3000);

            } catch (error) {
                console.error("Upload error:", error);
                alert("Failed to connect to backend server. Make sure it is running on port 8000.");
                submitBtn.disabled = false;
                submitBtn.innerHTML = '<i class="fas fa-microchip"></i> Try Again';
            }
        };

        // Drag and Drop handlers
        dropZone.ondragover = (e) => {
            e.preventDefault();
            dropZone.classList.add('drag-over');
        };

        dropZone.ondragleave = () => {
            dropZone.classList.remove('drag-over');
        };

        dropZone.ondrop = (e) => {
            e.preventDefault();
            dropZone.classList.remove('drag-over');
            fileInput.files = e.dataTransfer.files;
            fileInput.onchange();
        };

    </script>

</body>

</html>
